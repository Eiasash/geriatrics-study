name: Build, Audit & Release

on:
  push:
    branches: [main]
    paths:
      - 'h5p/**'
      - 'data/**'
      - '.github/workflows/build-and-package.yml'
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - 'h5p/**'
      - 'data/**'
      - '.github/workflows/build-and-package.yml'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a release'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      h5p: ${{ steps.filter.outputs.h5p }}
      data: ${{ steps.filter.outputs.data }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            h5p:
              - 'h5p/**'
              - 'data/**'
            data:
              - 'data/**'

  audit:
    name: Security audit (h5p)
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.h5p == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: h5p/package-lock.json
      - name: Install npm dependencies
        working-directory: h5p
        run: npm ci
      - name: Run npm audit
        working-directory: h5p
        run: |
          npm audit --audit-level=high || true
          npx audit-ci --high || true
        continue-on-error: true

  build:
    name: Build h5p (${{ matrix.mode }})
    runs-on: ubuntu-latest
    needs: [changes, audit]
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.h5p == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: questionset
            artifact: h5p-questionset
            build_cmd: npm run build:qset
          - mode: mega
            artifact: h5p-mega
            build_cmd: |
              export TOPICS="דליריום,שבריריות (Frailty),רישום ודה-פרסקייבינג תרופות,נפילות,דמנציה ומחלת אלצהיימר"
              export PASS=75
              npm run build:mega
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: h5p/package-lock.json
      - name: Install dependencies
        working-directory: h5p
        run: npm ci
      - name: Build h5p - ${{ matrix.mode }}
        working-directory: h5p
        run: ${{ matrix.build_cmd }}
      - name: Upload ${{ matrix.artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: h5p/dist/*
          retention-days: 30
          if-no-files-found: error

  validate:
    name: Validate packages
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - uses: actions/checkout@v6
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Validate H5P archives
        run: |
          echo "=== Validating built packages ==="
          for h5p in artifacts/*/*.h5p; do
            if [ -f "$h5p" ]; then
              echo "Validating: $h5p"
              unzip -t "$h5p" > /dev/null 2>&1 && echo "  Valid" || echo "  INVALID"
            fi
          done
      - name: Run validation script
        if: always()
        run: |
          if [ -f "check_files.py" ]; then
            PYTHONIOENCODING=utf-8 python check_files.py
          fi

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [build, validate]
    if: |
      success() && (
        startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true')
      )
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -name "*.h5p" -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS.txt
      - name: Generate release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=v$(date +'%Y.%m.%d')-${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [audit, build, validate]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Audit: ${{ needs.audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Validate: ${{ needs.validate.result }}" >> $GITHUB_STEP_SUMMARY
          # Fail only on actual failures, not skips
          if [[ "${{ needs.build.result }}" == "failure" ]] || [[ "${{ needs.validate.result }}" == "failure" ]]; then
            exit 1
          fi

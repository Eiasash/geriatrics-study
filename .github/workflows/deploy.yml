name: Deploy & Update Content

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Build: read-only access ──────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: h5p/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests

      - name: Install H5P dependencies
        working-directory: h5p
        run: npm ci

      - name: Build H5P packages
        working-directory: h5p
        run: npm run build:all

      - name: Fetch latest PubMed papers
        run: |
          if [ -f "scripts/pubmed_fetcher.py" ]; then
            python scripts/pubmed_fetcher.py || echo "PubMed fetch failed, continuing..."
          fi

      - name: Ensure data directory & content.json
        run: |
          mkdir -p data
          [ -f data/content.json ] || echo "[]" > data/content.json

      - name: Validate build outputs
        run: |
          PYTHONIOENCODING=utf-8 python check_files.py
          python scripts/audit_site.py

      - name: Assemble dist/site
        run: |
          mkdir -p dist/site
          # Core files
          cp index.html dist/site/
          cp 404.html dist/site/ 2>/dev/null || true
          cp robots.txt dist/site/ 2>/dev/null || true
          cp sitemap.xml dist/site/ 2>/dev/null || true
          cp manifest.json dist/site/ 2>/dev/null || true
          cp offline.html dist/site/ 2>/dev/null || true
          touch dist/site/.nojekyll
          # Stamp cache-busting version into service worker
          BUILD_TS=$(date +%Y%m%d%H%M)
          cp sw.js dist/site/sw.js
          sed -i "s/geriatrics-study-v[0-9]*/geriatrics-study-${BUILD_TS}/" dist/site/sw.js
          # Directories
          cp -r clinical-tools dist/site/ 2>/dev/null || true
          cp -r szmc-presentation-maker dist/site/ 2>/dev/null || true
          cp -r h5p dist/site/ 2>/dev/null || true
          cp -r data dist/site/ 2>/dev/null || true
          cp -r iv-protocols.html dist/site/ 2>/dev/null || true
          cp -r hazzards dist/site/ 2>/dev/null || true
          cp -r gerifellow-assistant dist/site/ 2>/dev/null || true
          cp -r tracking dist/site/ 2>/dev/null || true
          # Remove node_modules
          rm -rf dist/site/h5p/node_modules 2>/dev/null || true
          echo "=== dist/site contents ===" && ls -la dist/site/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

  # ── Deploy: pages-only permissions ───────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── Smoke test: verify key pages return 200 ──────────
  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test key pages (with retry)
        run: |
          SITE="https://eiasash.github.io/geriatrics-study"
          PAGES=(
            "/"
            "/clinical-tools/medications.html"
            "/clinical-tools/ai-assistant.html"
            "/szmc-presentation-maker/index.html"
            "/hazzards/"
            "/h5p/"
            "/h5p/dist/Mega_QuestionSet.h5p"
          )

          check_page() {
            local url="$1"
            local max_attempts=6
            local wait=10
            for attempt in $(seq 1 $max_attempts); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url")
              if [ "$STATUS" = "200" ]; then
                echo "OK (attempt $attempt): $url → $STATUS"
                return 0
              fi
              echo "Attempt $attempt/$max_attempts: $url returned $STATUS — retrying in ${wait}s..."
              sleep $wait
              wait=$((wait * 2))
            done
            echo "FAIL: $url did not return 200 after $max_attempts attempts"
            return 1
          }

          FAILED=0
          for path in "${PAGES[@]}"; do
            check_page "${SITE}${path}" || FAILED=1
          done
          exit $FAILED

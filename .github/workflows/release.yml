name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  build-release:
    name: Build release packages
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building release version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: h5p/package-lock.json

      - name: Install H5P dependencies
        working-directory: h5p
        run: npm ci

      - name: Build H5P QuestionSet
        working-directory: h5p
        run: npm run build:qset

      - name: Build H5P Mega
        working-directory: h5p
        run: |
          export TOPICS="דליריום,שבריריות (Frailty),רישום ודה-פרסקייבינג תרופות,נפילות,דמנציה ומחלת אלצהיימר"
          export PASS=75
          npm run build:mega

      - name: Create release archive
        run: |
          mkdir -p release
          cd h5p/dist
          zip -r ../../release/h5p-packages-${{ steps.version.outputs.version }}.zip *.h5p
          cd ../../release
          sha256sum *.zip > SHA256SUMS.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-packages
          path: release/*
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-packages
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build-release.outputs.version }}
          name: Release ${{ needs.build-release.outputs.version }}
          files: |
            release/*.zip
            release/SHA256SUMS.txt
          draft: false
          prerelease: false
          generate_release_notes: true

# SonarCloud configuration for geriatrics-study
sonar.projectKey=Eiasash_geriatrics-study
sonar.organization=eiasash

# Source directories
sonar.sources=h5p,szmc-presentation-maker/js,scripts,clinical-tools

# Test directories
sonar.tests=h5p/__tests__

# Exclusions from analysis
sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  **/dist/**,\
  **/libraries/**,\
  **/content/**,\
  **/*.min.js,\
  **/jest.config.js,\
  **/eslint.config.js

# Coverage report (generated by Jest in h5p/)
sonar.javascript.lcov.reportPaths=h5p/coverage/lcov.info

# Exclude browser-only and utility code from coverage requirements
# These files are not unit-testable without a browser environment
sonar.coverage.exclusions=\
  szmc-presentation-maker/**,\
  scripts/**,\
  clinical-tools/**

# Encoding
sonar.sourceEncoding=UTF-8

# SonarCloud configuration for geriatrics-study
sonar.projectKey=Eiasash_geriatrics-study
sonar.organization=eiasash

# Source directories — only Node.js build scripts and shared utilities
# szmc-presentation-maker/js is excluded: browser-only UI code that cannot be
# unit-tested and legitimately uses innerHTML for static HTML rendering.
# clinical-tools HTML files are excluded for the same reason.
sonar.sources=h5p,clinical-tools/shared

# Test directories
sonar.tests=h5p/__tests__

# Exclusions from analysis
sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  **/dist/**,\
  **/libraries/**,\
  **/content/**,\
  **/*.min.js,\
  **/jest.config.js,\
  **/eslint.config.js

# Coverage report (generated by Jest in h5p/)
sonar.javascript.lcov.reportPaths=h5p/coverage/lcov.info

# Exclude browser-only and utility code from coverage requirements
sonar.coverage.exclusions=\
  clinical-tools/**

# Encoding
sonar.sourceEncoding=UTF-8
